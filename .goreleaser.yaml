# .goreleaser.yaml
version: 2
project_name: mctui

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    binary: mctui
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    # use zip for windows
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: 'checksums.txt'

# Homebrew: publish a cask to the aayushdutt/homebrew-tap repo.
# Install with: brew install aayushdutt/tap/mctui
homebrew_casks:
  - name: mctui
    repository:
      owner: aayushdutt
      name: homebrew-tap
      # The default Actions GITHUB_TOKEN can't push to another repo; this is a
      # PAT (contents:write on homebrew-tap) stored as a repo secret.
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/aayushdutt/mctui"
    description: "Fast terminal-based Minecraft launcher"
    # Always build the cask, but only push it once the tap token is configured,
    # so a release never fails just because the secret isn't set yet.
    skip_upload: '{{ if eq .Env.HOMEBREW_TAP_GITHUB_TOKEN "" }}true{{ else }}false{{ end }}'
    # mctui ships unsigned; strip the macOS quarantine xattr on install so it
    # launches without a Gatekeeper prompt.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/mctui"]
          end

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
